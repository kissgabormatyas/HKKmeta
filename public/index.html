<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HKK Meta</title>

  window.dataLayer = window.dataLayer || [];

</head>

<body>

  <h1>HKK Meta</h1>
  <p class="data-period">
  Adatok:
  <strong id="dataPeriod"></strong>
</p>

<div class="format-switcher">
  <button
    type="button"
    class="format-button active"
    data-format="classic"
  >
    Hagyományos
  </button>

  <button
    type="button"
    class="format-button"
    data-format="tm"
  >
    Tiltott Mágia
  </button>
</div>

  <details class="collapsible-section filter-section" open>
    <summary>Szűrők</summary>

    <div class="filter-content">
      <div class="filter-group">
        <div class="filter-title">Szín</div>
        <div id="colorFilters" class="color-filter-list"></div>
      </div>

      <div class="filter-group">
        <label class="filter-title" for="flagSelect">Funkció</label>
        <select id="flagSelect">
          <option value="Összes">Összes</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-title" for="valueSelect">Megjelenítés</label>
        <select id="valueSelect">
          <option value="Alap összesen">Főpakli</option>
          <option value="Side összesen">Side</option>
          <option value="TOP">TOP20%</option>
          <option value="SUM">Összesen</option>
        </select>
      </div>
    </div>
  </details>

  <details class="collapsible-section orange-section" open>
    <summary>Narancslapok</summary>
    <section class="orange-section-inner">

  <div class="best-orange-block">
    <h2>Legjobb narancslapok</h2>
    <p class="best-orange-note">
      TOP20% alapján, holtversenyekkel együtt.
    </p>

    <div id="bestOrangeCards" class="best-orange-list"></div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <canvas id="orangeChart"></canvas>
    </div>

    <div class="chart-box">
      <canvas id="orangeTopChart"></canvas>
    </div>
  </div>

</section>
  </details>

  <main class="dashboard-layout">

  <details class="collapsible-section dashboard-charts">
    <summary>Grafikonok</summary>

    <div class="charts">
      <div class="chart-box">
        <canvas id="colorChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="typeChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="functionChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="editionChart"></canvas>
      </div>
    </div>
  </details>

  <details class="collapsible-section top10-section" open>
    <summary>TOP lapok</summary>
    <div id="top10Cards"></div>
  </details>

</main>

  <footer class="site-footer">
    <div class="footer-logo">HKK META</div>
    <div class="footer-copy">© 2026 HKK Meta</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  <script src="./script.js" charset="UTF-8"></script>

</body>
</html>
